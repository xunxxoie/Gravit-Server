services:
  gravit-server-dev:
    container_name: gravit-server-dev
    image: ${DOCKER_HUB_USERNAME}/gravit-server:dev
    ports:
      - "8521:8080"
    environment:
      - TZ=Asia/Seoul
      - SPRING_PROFILES_ACTIVE=dev
    networks:
      - gravit-dev
    volumes:
      - ./logs:/var/log/spring
    depends_on:
      gravit-redis-dev:
        condition: service_started


  gravit-redis-dev:
    container_name: gravit-redis-dev
    image: redis:latest
    ports:
      - "6389:6379"
    volumes:
      - redis_data:/data
    networks:
      - gravit-dev
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  alloy-dev:
    image: grafana/alloy:latest
    container_name: alloy-dev
    ports:
      - "12346:12345"
    volumes:
      - ./logs:/var/log/spring
      - ./infra/config.alloy:/etc/alloy/config.alloy:ro
    environment:
      - ALLOY_ENV=dev
    command: ["run", "/etc/alloy/config.alloy"]
    networks:
      - gravit-dev

volumes:
  redis_data:

networks:
  gravit-dev:
    driver: bridge
