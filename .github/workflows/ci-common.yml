name: 공통 CI

on:
  pull_request:
    branches:
      - dev

jobs:
  test:
    name: 테스트 코드 실행
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: JDK 버전 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Docker 소켓 권한 설정 (Testcontainers용)
        run: sudo chmod 666 /var/run/docker.sock

      - name: 테스트 실행
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: |
          chmod +x ./gradlew
          ./gradlew --info test

      - name: 테스트 결과 출력
        uses: EnricoMi/publish-unit-test-result-action@v1
        if: ${{ always() }}
        with:
          files: build/test-results/test/TEST-*.xml